name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: pip install -r requirements.txt
      
    - name: Lint with flake8
      run: flake8 service/ tests/ --max-line-length=127
      
    - name: Run unit tests with nose
      run: nosetests -v --with-coverage --cover-package=service