apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  workspaces:
    - name: source
  steps:
    - name: cleanup-workspace
      image: alpine:latest
      script: |
        #!/sh
        rm -rf /workspace/source/*

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose-test
spec:
  workspaces:
    - name: source
  steps:
    - name: run-tests
      image: python:3.9
      workingDir: /workspace/source
      script: |
        #!/sh
        pip install -r requirements.txt
        nosetests -v